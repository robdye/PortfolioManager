<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
:root{color-scheme:light dark;--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--r:12px}
:root[data-theme="light"]{--bg:#f6f8fa;--card:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--accent:#0969da;--green:#1a7f37;--red:#cf222e}
*{box-sizing:border-box;margin:0}body{background:var(--bg);font-family:"Segoe UI",system-ui,sans-serif;color:var(--text);padding:16px}
.quote-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.logo{width:44px;height:44px;border-radius:10px;object-fit:contain;background:var(--bg);border:1px solid var(--border)}
.info h2{font-size:18px;font-weight:700;margin:0}.info .sub{font-size:12px;color:var(--muted)}
.price{font-size:36px;font-weight:700;margin-bottom:4px}
.change{font-size:16px;font-weight:600;margin-left:8px}
.change.up{color:var(--green)}.change.down{color:var(--red)}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px}
.m{padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.m .l{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}.m .v{font-size:15px;font-weight:600;margin-top:2px}
.tag{display:inline-block;background:rgba(88,166,255,.1);color:var(--accent);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;margin-top:12px}
.ft{margin-top:12px;font-size:10px;color:var(--muted);text-align:center}
</style>
<script>(function(){var d=document.documentElement,m=matchMedia('(prefers-color-scheme:dark)');function t(){if(!d.dataset.theme)d.dataset.theme=m.matches?'dark':'light';}t();m.addEventListener('change',function(){if(!d.getAttribute('data-theme'))t();});})()</script>
</head>
<body>
<div class="quote-card" id="card"><div style="text-align:center;padding:32px;color:var(--muted)">Loading quote…</div></div>
<div class="ft">Portfolio Agent • Data via Finnhub • Not financial advice</div>
<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function reportHeight(){if(window.openai&&window.openai.notifyIntrinsicHeight)window.openai.notifyIntrinsicHeight(document.body.scrollHeight);}
function render(data){
  var q=data.quote||{}, p=data.profile||{}, sym=data.symbol||'';
  var dp=q.dp||0, d_=q.d||0, sign=dp>=0?'+':'', cls=dp>=0?'up':'down';
  var logoHtml=p.logo?'<img class="logo" src="'+esc(p.logo)+'" />':'<div class="logo" style="display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--muted)">'+sym.slice(0,2)+'</div>';
  document.getElementById('card').innerHTML=
    '<div class="header">'+logoHtml+'<div class="info"><h2>'+esc(p.name||sym)+'</h2><span class="sub">'+esc(sym)+' · '+esc(p.exchange||'')+'</span></div></div>'+
    '<div><span class="price">$'+(q.c||0).toFixed(2)+'</span><span class="change '+cls+'">'+sign+d_.toFixed(2)+' ('+sign+dp.toFixed(2)+'%)</span></div>'+
    '<div class="metrics">'+
      '<div class="m"><div class="l">Open</div><div class="v">$'+(q.o||0).toFixed(2)+'</div></div>'+
      '<div class="m"><div class="l">Prev Close</div><div class="v">$'+(q.pc||0).toFixed(2)+'</div></div>'+
      '<div class="m"><div class="l">Day High</div><div class="v">$'+(q.h||0).toFixed(2)+'</div></div>'+
      '<div class="m"><div class="l">Day Low</div><div class="v">$'+(q.l||0).toFixed(2)+'</div></div>'+
    '</div>'+
    (p.finnhubIndustry?'<span class="tag">'+esc(p.finnhubIndustry)+'</span>':'');
  reportHeight();
}
var to=window.__TOOL_DATA__||(window.openai&&window.openai.toolOutput)||{};
if(typeof to==='string'){try{to=JSON.parse(to);}catch(e){to={};}}
if(to&&(to.quote||to.profile))render(to);
</script>
</body></html>
