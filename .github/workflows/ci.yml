name: CI — Lint, Test & Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test --if-present

      - name: Security audit
        run: npm audit --audit-level=high

  digital-worker:
    name: Digital Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: digital-worker/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test --if-present

      - name: Security audit
        run: npm audit --audit-level=high

  docker:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [mcp-server, digital-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Build MCP Server image
        run: docker build -t portfolio-mcp-server:ci ./mcp-server

      - name: Build Digital Worker image
        run: docker build -t portfolio-digital-worker:ci ./digital-worker
