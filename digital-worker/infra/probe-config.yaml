properties:
  template:
    containers:
      - name: portfolio-manager-worker
        image: portfolioagentacr.azurecr.io/digital-worker:v4
        probes:
          - type: startup
            httpGet:
              path: /api/health
              port: 3978
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          - type: liveness
            httpGet:
              path: /api/health
              port: 3978
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
